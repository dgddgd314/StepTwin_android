name: Android CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행은 취소한다.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gradle 데몬 JVM 툴체인이 21 로 고정돼 있어 JDK 21 필요.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # SDK 설치 + 라이선스 동의 (AGP 가 compileSdk 36 등을 자동 내려받음).
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Gradle 캐시(의존성/빌드 캐시) 자동 구성.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # local.properties 는 커밋하지 않으므로(비밀키 포함) GitHub Secrets 값으로 생성한다.
      # sdk.dir 은 넣지 않는다 — setup-android 가 ANDROID_HOME 을 설정해준다.
      # Secrets 미설정 시 빈 값/기본값으로 폴백(빌드는 성공, 런타임 지도·서버만 비활성).
      - name: Create local.properties from secrets
        run: |
          {
            echo "KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}"
            echo "KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
            echo "SERVER_BASE_URL=${{ secrets.SERVER_BASE_URL }}"
          } > local.properties

      # 고정 release keystore(Secret) 를 복호화. 없으면 unsigned release 로 빌드된다.
      # secrets 는 step if 에서 직접 못 쓰므로 env 로 받아 bash 에서 분기한다.
      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/release.keystore
            echo "release keystore decoded"
          else
            echo "no RELEASE_KEYSTORE_BASE64 secret; building unsigned release"
          fi

      - name: Build debug + release & run unit tests
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --stacktrace --no-daemon assembleDebug assembleRelease testDebugUnitTest

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
